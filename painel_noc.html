<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel NOC</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
}

.dashboard{
  display:flex;
  gap:20px;
  margin-bottom:30px;
}

.card{
  flex:1;
  padding:20px;
  border-radius:10px;
  text-align:center;
  font-size:20px;
}

.critico{ background:#c0392b; }
.analise{ background:#f39c12; }
.resolvido{ background:#27ae60; }
.total{ background:#3498db; }

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #444;
  text-align:left;
}

.status-aberto{color:red;}
.status-analise{color:orange;}
.status-resolvido{color:lightgreen;}
</style>

</head>

<body>

<h1>Painel NOC - Incidentes</h1>

<div class="dashboard">

<div class="card critico">
Críticos
<h2 id="criticos">0</h2>
</div>

<div class="card analise">
Em análise
<h2 id="analise">0</h2>
</div>

<div class="card resolvido">
Resolvidos
<h2 id="resolvidos">0</h2>
</div>

<div class="card total">
Total
<h2 id="total">0</h2>
</div>

</div>
<h2>Dashboard NOC</h2>

<div style="display:flex; gap:20px">

<div>
<h3>Abertos</h3>
<p id="abertos">0</p>
</div>

<div>
<h3>Em análise</h3>
<p id="analise">0</p>
</div>

<div>
<h3>Resolvidos</h3>
<p id="resolvidos">0</p>
</div>

<div>
<h3>Críticos</h3>
<p id="criticos">0</p>
</div>

</div>

<h2>Lista de Incidentes</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Título</th>
<th>Criticidade</th>
<th>Status</th>
<th>Cliente</th>
</tr>
</thead>

<tbody id="listaIncidentes"></tbody>
</table>

<script>

function carregarIncidentes(){

fetch("http://localhost:3000/incidentes")
.then(res=>res.json())
.then(dados=>{

let lista=document.getElementById("listaIncidentes")
lista.innerHTML=""

let criticos=0
let analise=0
let resolvidos=0

dados.forEach(i=>{

if(i.criticidade==="critica") criticos++
if(i.status==="analise") analise++
if(i.status==="resolvido") resolvidos++

lista.innerHTML+=`
<tr>
<td>${i.id}</td>
<td>${i.titulo}</td>
<td>${i.criticidade}</td>
<td>${i.status}</td>
<td>${i.cliente}</td>
</tr>
`

})

document.getElementById("criticos").innerText=criticos
document.getElementById("analise").innerText=analise
document.getElementById("resolvidos").innerText=resolvidos
document.getElementById("total").innerText=dados.length

})

}

carregarIncidentes()

setInterval(carregarIncidentes,5000)

</script>
<script>

function carregarEstatisticas(){

fetch("http://localhost:3000/incidentes/estatisticas")
.then(res=>res.json())
.then(data=>{

document.getElementById("abertos").innerText = data.abertos
document.getElementById("analise").innerText = data.analise
document.getElementById("resolvidos").innerText = data.resolvidos
document.getElementById("criticos").innerText = data.criticos

})

}

carregarEstatisticas()

</script>

</body>
</html>
