<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fluxo Back-end — Incidentes</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; margin: 0; }
  h1 { color: #38bdf8; font-weight: 300; font-size: 22px; margin-bottom: 32px; letter-spacing: 1px; }
  svg { max-width: 680px; width: 100%; }
  .th { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
  .ts { font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: 400; }
  .arr { stroke: #475569; stroke-width: 1.5; fill: none; }
</style>
</head>
<body>
<h1>Fluxo 2 — Incidentes (Back-end)</h1>
<svg viewBox="0 0 680 760">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<ellipse cx="340" cy="40" rx="80" ry="22" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
<text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central" fill="#f1f5f9">Início</text>
<line x1="340" y1="62" x2="340" y2="96" class="arr" marker-end="url(#arrow)"/>

<rect x="190" y="96" width="300" height="56" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="0.5"/>
<text class="th" x="340" y="118" text-anchor="middle" dominant-baseline="central" fill="#c7d2fe">POST /incidentes</text>
<text class="ts" x="340" y="138" text-anchor="middle" dominant-baseline="central" fill="#a5b4fc">rotas/incidentes.js → controller</text>
<line x1="340" y1="152" x2="340" y2="186" class="arr" marker-end="url(#arrow)"/>

<rect x="160" y="186" width="360" height="56" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="0.5"/>
<text class="th" x="340" y="208" text-anchor="middle" dominant-baseline="central" fill="#c7d2fe">incidentesController.criarIncidente()</text>
<text class="ts" x="340" y="228" text-anchor="middle" dominant-baseline="central" fill="#a5b4fc">extrai dados do body da requisição</text>
<line x1="340" y1="242" x2="340" y2="276" class="arr" marker-end="url(#arrow)"/>

<rect x="180" y="276" width="320" height="56" rx="8" fill="#78350f" stroke="#b45309" stroke-width="0.5"/>
<text class="th" x="340" y="298" text-anchor="middle" dominant-baseline="central" fill="#fde68a">iaSugestao.sugerirSolucao()</text>
<text class="ts" x="340" y="318" text-anchor="middle" dominant-baseline="central" fill="#fcd34d">analisa titulo + descricao</text>
<line x1="340" y1="332" x2="340" y2="366" class="arr" marker-end="url(#arrow)"/>

<rect x="170" y="366" width="340" height="56" rx="8" fill="#134e4a" stroke="#0f766e" stroke-width="0.5"/>
<text class="th" x="340" y="388" text-anchor="middle" dominant-baseline="central" fill="#99f6e4">INSERT INTO incidentes</text>
<text class="ts" x="340" y="408" text-anchor="middle" dominant-baseline="central" fill="#5eead4">salva no banco TiDB</text>
<line x1="340" y1="422" x2="340" y2="456" class="arr" marker-end="url(#arrow)"/>

<rect x="170" y="456" width="340" height="56" rx="8" fill="#134e4a" stroke="#0f766e" stroke-width="0.5"/>
<text class="th" x="340" y="478" text-anchor="middle" dominant-baseline="central" fill="#99f6e4">INSERT INTO logs_incidente</text>
<text class="ts" x="340" y="498" text-anchor="middle" dominant-baseline="central" fill="#5eead4">log automático da criação</text>
<line x1="340" y1="512" x2="340" y2="546" class="arr" marker-end="url(#arrow)"/>

<rect x="170" y="546" width="340" height="56" rx="8" fill="#134e4a" stroke="#0f766e" stroke-width="0.5"/>
<text class="th" x="340" y="568" text-anchor="middle" dominant-baseline="central" fill="#99f6e4">res.status(201).json()</text>
<text class="ts" x="340" y="588" text-anchor="middle" dominant-baseline="central" fill="#5eead4">retorna id + sugestaoIA</text>
<line x1="340" y1="602" x2="340" y2="636" class="arr" marker-end="url(#arrow)"/>

<ellipse cx="340" cy="658" rx="80" ry="22" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
<text class="th" x="340" y="658" text-anchor="middle" dominant-baseline="central" fill="#f1f5f9">Fim</text>
</svg>
</body>
</html>
