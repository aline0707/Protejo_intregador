<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fluxo Back-end — Autenticação</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; margin: 0; }
  h1 { color: #38bdf8; font-weight: 300; font-size: 22px; margin-bottom: 32px; letter-spacing: 1px; }
  svg { max-width: 680px; width: 100%; }
  .node { cursor: pointer; }
  .node:hover rect, .node:hover ellipse { opacity: 0.85; }
  .box { fill: #1e293b; stroke: #334155; }
  .th { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; fill: #f1f5f9; }
  .ts { font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: 400; fill: #94a3b8; }
  .arr { stroke: #475569; stroke-width: 1.5; fill: none; }
  marker path { stroke: #475569; }
</style>
</head>
<body>
<h1>Fluxo 1 — Autenticação (Back-end)</h1>
<svg viewBox="0 0 680 660">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<ellipse cx="340" cy="40" rx="80" ry="22" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
<text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Início</text>
<line x1="340" y1="62" x2="340" y2="96" class="arr" marker-end="url(#arrow)"/>

<rect x="200" y="96" width="280" height="56" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="0.5"/>
<text class="th" x="340" y="118" text-anchor="middle" dominant-baseline="central" fill="#c7d2fe">Frontend envia POST /login</text>
<text class="ts" x="340" y="138" text-anchor="middle" dominant-baseline="central" fill="#a5b4fc">rotas/login.js recebe a requisição</text>
<line x1="340" y1="152" x2="340" y2="186" class="arr" marker-end="url(#arrow)"/>

<rect x="190" y="186" width="300" height="56" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="0.5"/>
<text class="th" x="340" y="208" text-anchor="middle" dominant-baseline="central" fill="#c7d2fe">loginController.login()</text>
<text class="ts" x="340" y="228" text-anchor="middle" dominant-baseline="central" fill="#a5b4fc">extrai usuario e senha do body</text>
<line x1="340" y1="242" x2="340" y2="276" class="arr" marker-end="url(#arrow)"/>

<rect x="170" y="276" width="340" height="56" rx="8" fill="#134e4a" stroke="#0f766e" stroke-width="0.5"/>
<text class="th" x="340" y="298" text-anchor="middle" dominant-baseline="central" fill="#99f6e4">SELECT no banco TiDB</text>
<text class="ts" x="340" y="318" text-anchor="middle" dominant-baseline="central" fill="#5eead4">WHERE email = ? AND senha = ?</text>
<line x1="340" y1="332" x2="340" y2="366" class="arr" marker-end="url(#arrow)"/>

<polygon points="340,366 470,406 340,446 210,406" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
<text class="th" x="340" y="400" text-anchor="middle" dominant-baseline="central" fill="#f1f5f9">Usuário</text>
<text class="th" x="340" y="418" text-anchor="middle" dominant-baseline="central" fill="#f1f5f9">encontrado?</text>

<line x1="340" y1="446" x2="340" y2="490" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="472" fill="#94a3b8">Sim</text>

<rect x="190" y="490" width="300" height="56" rx="8" fill="#134e4a" stroke="#0f766e" stroke-width="0.5"/>
<text class="th" x="340" y="512" text-anchor="middle" dominant-baseline="central" fill="#99f6e4">Verifica se ativo = 1</text>
<text class="ts" x="340" y="532" text-anchor="middle" dominant-baseline="central" fill="#5eead4">retorna autenticado: true + dados</text>

<line x1="470" y1="406" x2="570" y2="406" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="478" y="398" fill="#94a3b8">Não</text>
<rect x="570" y="384" width="92" height="44" rx="8" fill="#7f1d1d" stroke="#991b1b" stroke-width="0.5"/>
<text class="th" x="616" y="406" text-anchor="middle" dominant-baseline="central" fill="#fecaca">401 erro</text>

<line x1="340" y1="546" x2="340" y2="590" class="arr" marker-end="url(#arrow)"/>
<ellipse cx="340" cy="612" rx="110" ry="22" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
<text class="th" x="340" y="612" text-anchor="middle" dominant-baseline="central" fill="#f1f5f9">Resposta ao frontend</text>
</svg>
</body>
</html>
