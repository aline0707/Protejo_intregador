<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fluxo Back-end — Usuários</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; margin: 0; }
  h1 { color: #38bdf8; font-weight: 300; font-size: 22px; margin-bottom: 32px; letter-spacing: 1px; }
  svg { max-width: 680px; width: 100%; }
  .th { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; }
  .ts { font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: 400; }
  .arr { stroke: #475569; stroke-width: 1.5; fill: none; }
</style>
</head>
<body>
<h1>Fluxo 3 — Usuários (Back-end)</h1>
<svg viewBox="0 0 680 720">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<ellipse cx="340" cy="40" rx="80" ry="22" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
<text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central" fill="#f1f5f9">Início</text>
<line x1="340" y1="62" x2="340" y2="96" class="arr" marker-end="url(#arrow)"/>

<rect x="180" y="96" width="320" height="56" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="0.5"/>
<text class="th" x="340" y="118" text-anchor="middle" dominant-baseline="central" fill="#c7d2fe">Requisição chega em /usuarios</text>
<text class="ts" x="340" y="138" text-anchor="middle" dominant-baseline="central" fill="#a5b4fc">rotas/usuarios.js → controller</text>
<line x1="340" y1="152" x2="340" y2="196" class="arr" marker-end="url(#arrow)"/>

<polygon points="340,196 470,236 340,276 210,236" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
<text class="th" x="340" y="230" text-anchor="middle" dominant-baseline="central" fill="#f1f5f9">Qual</text>
<text class="th" x="340" y="248" text-anchor="middle" dominant-baseline="central" fill="#f1f5f9">método?</text>

<line x1="340" y1="276" x2="340" y2="316" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="300" fill="#94a3b8">POST</text>
<rect x="190" y="316" width="300" height="56" rx="8" fill="#134e4a" stroke="#0f766e" stroke-width="0.5"/>
<text class="th" x="340" y="338" text-anchor="middle" dominant-baseline="central" fill="#99f6e4">criarUsuario()</text>
<text class="ts" x="340" y="358" text-anchor="middle" dominant-baseline="central" fill="#5eead4">INSERT INTO usuarios</text>

<line x1="470" y1="236" x2="576" y2="236" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="476" y="228" fill="#94a3b8">GET</text>
<rect x="576" y="214" width="90" height="44" rx="8" fill="#134e4a" stroke="#0f766e" stroke-width="0.5"/>
<text class="th" x="621" y="236" text-anchor="middle" dominant-baseline="central" fill="#99f6e4">listar()</text>

<line x1="210" y1="236" x2="104" y2="236" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="112" y="228" fill="#94a3b8">PUT</text>
<rect x="28" y="214" width="78" height="44" rx="8" fill="#134e4a" stroke="#0f766e" stroke-width="0.5"/>
<text class="th" x="67" y="236" text-anchor="middle" dominant-baseline="central" fill="#99f6e4">update()</text>

<line x1="340" y1="372" x2="340" y2="440" class="arr" marker-end="url(#arrow)"/>
<line x1="621" y1="258" x2="621" y2="460" stroke="#475569" stroke-width="0.8" fill="none"/>
<line x1="621" y1="460" x2="512" y2="460" stroke="#475569" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>
<line x1="67" y1="258" x2="67" y2="460" stroke="#475569" stroke-width="0.8" fill="none"/>
<line x1="67" y1="460" x2="168" y2="460" stroke="#475569" stroke-width="0.8" fill="none" marker-end="url(#arrow)"/>

<rect x="170" y="440" width="340" height="56" rx="8" fill="#134e4a" stroke="#0f766e" stroke-width="0.5"/>
<text class="th" x="340" y="462" text-anchor="middle" dominant-baseline="central" fill="#99f6e4">Executa SQL no TiDB</text>
<text class="ts" x="340" y="482" text-anchor="middle" dominant-baseline="central" fill="#5eead4">IFNULL preserva valores existentes</text>
<line x1="340" y1="496" x2="340" y2="540" class="arr" marker-end="url(#arrow)"/>

<rect x="190" y="540" width="300" height="56" rx="8" fill="#134e4a" stroke="#0f766e" stroke-width="0.5"/>
<text class="th" x="340" y="562" text-anchor="middle" dominant-baseline="central" fill="#99f6e4">res.status(200 ou 201).json()</text>
<text class="ts" x="340" y="582" text-anchor="middle" dominant-baseline="central" fill="#5eead4">mensagem de sucesso</text>
<line x1="340" y1="596" x2="340" y2="640" class="arr" marker-end="url(#arrow)"/>

<ellipse cx="340" cy="662" rx="80" ry="22" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
<text class="th" x="340" y="662" text-anchor="middle" dominant-baseline="central" fill="#f1f5f9">Fim</text>
</svg>
</body>
</html>
