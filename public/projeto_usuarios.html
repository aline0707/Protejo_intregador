<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Usuários - SentinelaOps</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>SentinelaOps</h2>
        <a href="/index.html">🏠 Login</a>
        <a href="/painel_noc.html">📊 Painel NOC</a>
        <a href="/projeto_incidentes.html">🚨 Incidentes</a>
        <a href="/projeto_usuarios.html" class="active">👥 Usuários</a>
        <a href="/logs.html">📋 Logs</a>
        <a href="#" onclick="logout()" style="margin-top: auto; color: #fb7185;">🚪 Sair</a>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">
        <h1>👥 Gestão de Usuários</h1>

        <!-- FORMULÁRIO DE NOVO USUÁRIO -->
        <div class="card">
            <h2 style="margin-bottom: 20px; font-size: 18px;">Cadastrar Novo Usuário</h2>

            <div style="display: flex; gap: 15px;">
                <input type="text" id="nome" placeholder="Nome completo" style="flex: 1;">
                <input type="email" id="email" placeholder="E-mail" style="flex: 1;">
            </div>

            <div style="display: flex; gap: 15px;">
                <input type="password" id="senha" placeholder="Senha" style="flex: 1;">
                <select id="perfil" style="flex: 1;">
                    <option value="analista">Analista</option>
                    <option value="admin">Administrador</option>
                    <option value="viewer">Visualizador</option>
                </select>
            </div>

            <button onclick="criarUsuario()">➕ Cadastrar Usuário</button>
        </div>

        <!-- TABELA DE USUÁRIOS -->
        <div class="card">
            <h2 style="margin-bottom: 15px; font-size: 18px;">Usuários Cadastrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Perfil</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaUsuarios">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #94a3b8;">Carregando usuários...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="/js/index.js"></script>
<script src="/js/projeto_usuarios.js"></script>
</body>
</html>
