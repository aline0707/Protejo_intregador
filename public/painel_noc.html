<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Painel NOC</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#111;
color:white;
margin:0;
}

/* LAYOUT */

.layout{
display:flex;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#020617;
height:100vh;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.sidebar a:hover{
background:#1e293b;
}

/* CONTEÚDO */

.conteudo{
flex:1;
padding:40px;
max-width:1400px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

/* DASHBOARD */

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
padding:20px;
border-radius:10px;
text-align:center;
font-size:20px;
}

.critico{ background:#c0392b; }
.analise{ background:#f39c12; }
.resolvido{ background:#27ae60; }
.total{ background:#3498db; }

/* GRÁFICOS */

.graficos{
display:flex;
gap:30px;
margin-top:30px;
flex-wrap:wrap;
}

.grafico-card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:450px;
height:320px;
}

canvas{
width:100% !important;
height:100% !important;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #444;
text-align:left;
}

</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>SentinelaOps</h2>

<a href="index.html">Dashboard</a>
<a href="projeto_incidentes.html">Incidentes</a>
<a href="projeto_usuarios.html">Usuários</a>
<a href="painel_noc.html">Painel NOC</a>
<a href="logs.html">Logs</a>

<hr>

<a href="#" onclick="logout()">Sair</a>

</div>


<!-- CONTEÚDO -->

<div class="conteudo">

<h1>Painel NOC - Incidentes</h1>

<!-- DASHBOARD -->

<div class="dashboard">

<div class="card critico">
Críticos
<h2 id="criticos">0</h2>
</div>

<div class="card analise">
Em análise
<h2 id="analise">0</h2>
</div>

<div class="card resolvido">
Resolvidos
<h2 id="resolvidos">0</h2>
</div>

<div class="card total">
Total
<h2 id="total">0</h2>
</div>

</div>


<!-- GRÁFICOS -->

<h2>Estatísticas de Incidentes</h2>

<div class="graficos">

<div class="grafico-card">
<canvas id="graficoStatus"></canvas>
</div>

<div class="grafico-card">
<canvas id="graficoCriticidade"></canvas>
</div>

</div>


<!-- LISTA -->

<h2>Lista de Incidentes</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>Título</th>
<th>Criticidade</th>
<th>Status</th>
<th>Cliente</th>
</tr>
</thead>

<tbody id="listaIncidentes"></tbody>

</table>

</div>

</div>


<script>

let graficoStatus
let graficoCriticidade


function criarGraficos(dados){

let abertos = dados.filter(i => i.status === "aberto").length
let analise = dados.filter(i => i.status === "analise").length
let resolvidos = dados.filter(i => i.status === "resolvido").length

let baixa = dados.filter(i => i.criticidade === "baixa").length
let media = dados.filter(i => i.criticidade === "media").length
let alta = dados.filter(i => i.criticidade === "alta").length
let critica = dados.filter(i => i.criticidade === "critica").length


if(graficoStatus){
graficoStatus.destroy()
}

if(graficoCriticidade){
graficoCriticidade.destroy()
}


/* GRÁFICO STATUS - BARRA HORIZONTAL */

graficoStatus = new Chart(document.getElementById("graficoStatus"),{

type:"bar",

data:{
labels:["Abertos","Em análise","Resolvidos"],
datasets:[{
label:"Incidentes",
data:[abertos,analise,resolvidos],
backgroundColor:[
"#ef4444",
"#f59e0b",
"#22c55e"
]
}]
},

options:{
indexAxis:"y",
plugins:{
legend:{display:false}
}
}

})


/* GRÁFICO CRITICIDADE */

graficoCriticidade = new Chart(document.getElementById("graficoCriticidade"),{

type:"bar",

data:{
labels:["Baixa","Média","Alta","Crítica"],
datasets:[{
label:"Incidentes",
data:[baixa,media,alta,critica],
backgroundColor:"#3b82f6"
}]
}

})

}



function carregarIncidentes(){

fetch("http://localhost:3000/incidentes")

.then(res=>res.json())

.then(dados=>{

let lista=document.getElementById("listaIncidentes")

lista.innerHTML=""

let criticos=0
let analise=0
let resolvidos=0


dados.forEach(i=>{

if(i.criticidade==="critica") criticos++
if(i.status==="analise") analise++
if(i.status==="resolvido") resolvidos++

lista.innerHTML+=`

<tr>
<td>${i.id}</td>
<td>${i.titulo}</td>
<td>${i.criticidade}</td>
<td>${i.status}</td>
<td>${i.cliente}</td>
</tr>

`

})


document.getElementById("criticos").innerText = criticos
document.getElementById("analise").innerText = analise
document.getElementById("resolvidos").innerText = resolvidos
document.getElementById("total").innerText = dados.length


criarGraficos(dados)

})

}


/* LOGOUT */

function logout(){

localStorage.removeItem("usuario")

window.location.href = "login.html"

}


/* CARREGAR DADOS */

carregarIncidentes()

setInterval(carregarIncidentes,5000)

</script>

</body>
</html>
