<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel NOC - SentinelaOps</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>SentinelaOps</h2>
        <a href="/index.html">Dashboard</a>
        <a href="/painel_noc.html" class="active">Painel NOC</a>
        <a href="/projeto_incidentes.html">Incidentes</a>
        <a href="/projeto_usuarios.html">Usuários</a>
        <a href="/logs.html">Logs</a>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">
        <h1>Painel NOC</h1>

        <!-- CONTADORES -->
        <div style="display: flex; gap: 20px; margin-bottom: 30px;">
            <div class="card" style="flex:1; text-align:center;">
                <div style="font-size: 14px; color: #94a3b8;">Total de Incidentes</div>
                <div id="num-total" style="font-size: 36px; font-weight: bold;">--</div>
            </div>
            <div class="card" style="flex:1; text-align:center;">
                <div style="font-size: 14px; color: #94a3b8;">Críticos</div>
                <div id="num-criticos" style="font-size: 36px; font-weight: bold; color: #ef4444;">--</div>
            </div>
        </div>

        <!-- GRÁFICOS -->
        <div style="display: flex; gap: 20px; margin-bottom: 30px;">
            <div class="card" style="flex:2; height: 250px;">
                <canvas id="graficoStatus"></canvas>
            </div>
            <div class="card" style="flex:1; height: 250px;">
                <canvas id="graficoCriticidade"></canvas>
            </div>
        </div>

        <!-- TABELA TOP 5 -->
        <div class="card">
            <h2 style="margin-bottom: 15px; font-size: 18px;">Últimos Incidentes</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Criticidade</th>
                        <th>Status</th>
                        <th>Cliente</th>
                    </tr>
                </thead>
                <tbody id="listaIncidentes">
                    <tr><td colspan="5" style="text-align:center;">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/index.js"></script>
<script src="/js/painel_noc.js"></script>
</body>
</html>
