<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel NOC - SentinelaOps</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #020617;
            height: 100vh;
            padding: 25px;
            position: sticky;
            top: 0;
        }

        .sidebar h2 { color: #38bdf8; margin-bottom: 30px; text-align: center; }
        
        .sidebar a {
            display: block;
            color: #94a3b8;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover, .sidebar a.active { background: #1e293b; color: white; }
        .sidebar a.active { border-left: 4px solid #38bdf8; }

        /* CONTEÚDO */
        .conteudo {
            flex: 1;
            padding: 40px;
            max-width: 1400px;
        }

        h1 { margin-bottom: 30px; font-weight: 300; }

        /* DASHBOARD CARDS */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card h2 { font-size: 36px; margin-top: 10px; }
        .critico { background: #ef4444; }
        .analise { background: #f59e0b; }
        .resolvido { background: #10b981; }
        .total { background: #3b82f6; }

        /* GRÁFICOS */
        .secao-titulo { margin: 40px 0 20px; color: #38bdf8; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        .graficos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
        }

        .grafico-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            height: 350px; /* Altura fixa para os gráficos */
        }

        /* TABELA */
        .tabela-container {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        th { color: #94a3b8; text-align: left; padding: 15px; border-bottom: 2px solid #334155; }
        td { padding: 15px; border-bottom: 1px solid #334155; }

        /* Badges de Status/Criticidade */
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-critica { background: #7f1d1d; color: #fecaca; }
        .badge-alta { background: #9a3412; color: #ffedd5; }
        .badge-resolvido { background: #064e3b; color: #d1fae5; }

    </style>
</head>
<body>

<nav class="sidebar">
    <h2>SentinelaOps</h2>
    <!-- <a href="index.html">Dashboard</a> -->
    <a href="projeto_incidentes.html">Incidentes</a>
    <a href="projeto_usuarios.html">Usuários</a>
    <a href="painel_noc.html" class="active">Painel NOC</a>
    <a href="logs.html">Logs</a>
    <hr style="border:0; border-top:1px solid #334155; margin: 20px 0;">
    <a href="#" onclick="logout()" style="color: #fb7185;">Sair</a>
</nav>

<main class="conteudo">
    <h1>Painel de Operações (NOC)</h1>

    <div class="dashboard">
        <div class="card critico">Críticos <h2 id="num-criticos">0</h2></div>
        <div class="card analise">Em análise <h2 id="num-analise">0</h2></div>
        <div class="card resolvido">Resolvidos <h2 id="num-resolvidos">0</h2></div>
        <div class="card total">Total <h2 id="num-total">0</h2></div>
    </div>

    <h2 class="secao-titulo">Estatísticas em Tempo Real</h2>
    <div class="graficos">
        <div class="grafico-card">
            <canvas id="graficoStatus"></canvas>
        </div>
        <div class="grafico-card">
            <canvas id="graficoCriticidade"></canvas>
        </div>
    </div>

    <h2 class="secao-titulo">Últimos Incidentes</h2>
    <div class="tabela-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Criticidade</th>
                    <th>Status</th>
                    <th>Cliente</th>
                </tr>
            </thead>
            <tbody id="listaIncidentes"></tbody>
        </table>
    </div>
    
</main>

</body>
</html>
