<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SentinelaOps</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 400;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: white;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #38bdf8;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .erro {
            color: #fb7185;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">SENTINELAOPS</div>
    <h2>Acesso ao Sistema</h2>

    <form id="formLogin">
        <input type="text" id="usuario" placeholder="Usuário" required>
        <input type="password" id="senha" placeholder="Senha" required>
        <button type="submit">Entrar no Painel</button>
    </form>

    <div id="erro" class="erro"></div>
</div>

</html>
