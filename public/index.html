<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema ITSM - SentinelaOps</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* Centraliza verticalmente na tela toda */
            margin: 0;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2.5rem;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px;
        }

        /* Estilizando o link diretamente como botão */
        .btn {
            padding: 15px 25px;
            font-size: 16px;
            text-decoration: none; /* Remove o sublinhado do link */
            border-radius: 8px;
            transition: background 0.3s ease;
            background: #2563eb;
            color: white;
            font-weight: bold;
        }

        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px); /* Pequeno efeito de flutuar */
        }
    </style>
</head>
<body>

    <h1>Sistema de Gestão de Incidentes</h1>

    <nav class="menu">
        <a href="login.html" class="btn">Login</a>
        <a href="projeto_incidentes.html" class="btn">Incidentes</a>
        <a href="painel_noc.html" class="btn">Painel NOC</a>
        <a href="projeto_usuarios.html" class="btn">Usuários</a>
    </nav>

</body>
</html>
