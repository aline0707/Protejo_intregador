<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - SentinelaOps</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="justify-content: center; align-items: center; display: flex;">
    <div class="card" style="max-width: 380px; width: 100%;">
        <div style="color: #38bdf8; text-align: center; font-weight: bold; margin-bottom: 20px;">SENTINELAOPS</div>
        <form id="formLogin">
            <input type="text" id="usuario" placeholder="Usuário" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit" style="width: 100%;">Entrar no Painel</button>
        </form>
        <div id="erro" style="color: #fb7185; text-align: center; margin-top: 15px;"></div>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
