<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Incidentes - SentinelaOps</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>SentinelaOps</h2>
        <a href="/index.html">🏠 Login</a>
        <a href="/painel_noc.html">📊 Painel NOC</a>
        <a href="/projeto_incidentes.html" class="active">🚨 Incidentes</a>
        <a href="/projeto_usuarios.html">👥 Usuários</a>
        <a href="/logs.html">📋 Logs</a>
        <a href="#" onclick="logout()" style="margin-top: auto; color: #fb7185;">🚪 Sair</a>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">
        <h1>🚨 Gestão de Incidentes</h1>

        <!-- FORMULÁRIO DE NOVO INCIDENTE -->
        <div class="card">
            <h2 style="margin-bottom: 20px; font-size: 18px;">Registrar Novo Incidente</h2>

            <input type="text" id="titulo" placeholder="Título do incidente" oninput="analisarIncidente()">
            <textarea id="descricao" placeholder="Descrição detalhada..." rows="3" oninput="analisarIncidente()"></textarea>

            <div style="display: flex; gap: 15px;">
                <select id="criticidade" style="flex: 1;">
                    <option value="baixa">Baixa</option>
                    <option value="media">Média</option>
                    <option value="alta">Alta</option>
                    <option value="critica">Crítica</option>
                </select>

                <select id="status" style="flex: 1;">
                    <option value="aberto">Aberto</option>
                    <option value="analise">Em Análise</option>
                    <option value="resolvido">Resolvido</option>
                </select>
            </div>

            <input type="text" id="cliente" placeholder="Cliente afetado">

            <!-- SUGESTÃO DA IA -->
            <div id="sugestaoIA" style="
                background: #0f172a;
                border-left: 4px solid #38bdf8;
                padding: 12px 15px;
                border-radius: 8px;
                color: #94a3b8;
                margin-bottom: 15px;
                min-height: 42px;
            ">💡 Preencha o título para receber uma sugestão automática...</div>

            <button onclick="criarIncidente()">➕ Registrar Incidente</button>
        </div>

        <!-- TABELA DE INCIDENTES -->
        <div class="card">
            <h2 style="margin-bottom: 15px; font-size: 18px;">Incidentes Registrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Criticidade</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="listaIncidentes">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #94a3b8;">Carregando incidentes...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="/js/index.js"></script>
<script src="/js/projeto_incidentes.js"></script>
</body>
</html>
