<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Login - SentinelaOps</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background:#1e293b;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0px 0px 20px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.logo{
text-align:center;
font-size:20px;
margin-bottom:10px;
font-weight:bold;
color:#38bdf8;
}

.erro{
color:#ef4444;
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">SentinelaOps</div>

<h2>Login do Sistema</h2>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div id="erro" class="erro"></div>

</div>

<script>

function login(){

const usuario = document.getElementById("usuario").value
const senha = document.getElementById("senha").value

fetch("http://localhost:3000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
usuario:usuario,
senha:senha
})

})
.then(res => res.json())
.then(data => {

if(data.autenticado){

window.location.href = "painel_noc.html"

}else{

document.getElementById("erro").innerText = "Usuário ou senha inválidos"

}

})

}

</script>

</body>
</html>
